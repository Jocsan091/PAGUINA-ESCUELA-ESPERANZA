backend:
  name: github
  repo: Jocsan091/PAGINA-ESCUELA-ESPERANZA
  branch: main
  base_url: https://pagina-escuela-esperanza.pages.dev
  auth_endpoint: /api/auth

local_backend: true

media_folder: "public/images/noticias"
public_folder: "/images/noticias"

collections:
  - name: "noticias"
    label: "Noticias"
    folder: "src/content/noticias"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Titulo"
        name: "title"
        widget: "string"
        required: true

      - label: "Fecha"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false
        required: true

      - label: "Imagen principal"
        name: "image"
        widget: "image"
        required: true

      - label: "Galeria de imagenes"
        name: "gallery"
        widget: "list"
        required: false
        summary: "{{fields.foto_url}}"
        fields:
          - label: "Foto"
            name: "foto_url"
            widget: "image"
            required: true

      - label: "Video de YouTube"
        name: "video_url"
        widget: "string"
        required: false

      - label: "Borrador"
        name: "draft"
        widget: "boolean"
        default: false
        required: false

      - label: "Texto completo"
        name: "body"
        widget: "markdown"
        required: true

  - name: "configuracion"
    label: "Configuracion"
    files:
      - label: "Documentacion Oficial"
        name: "documentos_oficiales"
        file: "src/data/documentosOficiales.json"
        fields:
          - label: "Documentos"
            name: "documentos"
            widget: "list"
            allow_add: true
            collapsed: false
            required: false
            default: []
            summary: "{{fields.titulo}}"
            fields:
              - label: "Titulo"
                name: "titulo"
                widget: "string"
                required: true

              - label: "Identificador"
                name: "id"
                widget: "string"
                required: true
                hint: "Usa texto simple sin espacios, por ejemplo reglamento-interno."

              - label: "Archivo PDF"
                name: "href"
                widget: "file"
                required: true
                media_folder: "public/documentos"
                public_folder: "/documentos"

      - label: "Directivas y perfiles"
        name: "directivas_perfiles"
        file: "src/data/directivas.json"
        fields:
          - label: "Directivas"
            name: "directivas"
            widget: "list"
            allow_add: true
            collapsed: false
            summary: "{{fields.titulo}}"
            fields:
              - label: "Titulo de la vista"
                name: "titulo"
                widget: "string"
                required: true

              - label: "Identificador de URL"
                name: "slug"
                widget: "string"
                required: true
                hint: "Usa texto simple sin espacios, por ejemplo equipo-directivo."

              - label: "Integrantes"
                name: "integrantes"
                widget: "list"
                allow_add: true
                collapsed: false
                required: false
                default: []
                summary: "{{fields.nombre}} - {{fields.cargo}}"
                fields:
                  - label: "Nombre"
                    name: "nombre"
                    widget: "string"
                    required: true

                  - label: "Cargo"
                    name: "cargo"
                    widget: "string"
                    required: true

                  - label: "Foto"
                    name: "imagen"
                    widget: "image"
                    required: true
                    media_folder: "public/images/perfiles"
                    public_folder: "/images/perfiles"

                  - label: "Descripcion del cargo"
                    name: "descripcion"
                    widget: "text"
                    required: true

              - label: "Texto de la seccion"
                name: "descripcion"
                widget: "list"
                allow_add: true
                collapsed: false
                required: false
                default: []
                field:
                  label: "Parrafo"
                  name: "parrafo"
                  widget: "text"

      - label: "PIE"
        name: "pie"
        file: "src/data/pieContenido.json"
        fields:
          - label: "Titulo"
            name: "titulo"
            widget: "string"
            required: true

          - label: "Subtitulo"
            name: "subtitulo"
            widget: "string"
            required: true

          - label: "Introduccion"
            name: "introduccion"
            widget: "text"
            required: true

          - label: "Imagen principal"
            name: "imagenPrincipal"
            widget: "image"
            required: true
            media_folder: "public/images/pie"
            public_folder: "/images/pie"

          - label: "Secciones informativas"
            name: "secciones"
            widget: "list"
            allow_add: true
            collapsed: false
            summary: "{{fields.titulo}}"
            fields:
              - label: "Titulo"
                name: "titulo"
                widget: "string"
                required: true

              - label: "Imagen"
                name: "imagen"
                widget: "image"
                required: true
                media_folder: "public/images/pie"
                public_folder: "/images/pie"

              - label: "Texto"
                name: "texto"
                widget: "list"
                allow_add: true
                collapsed: false
                field:
                  label: "Parrafo"
                  name: "parrafo"
                  widget: "text"

          - label: "Personal"
            name: "personal"
            widget: "list"
            allow_add: true
            collapsed: false
            required: false
            default: []
            summary: "{{fields.nombre}} - {{fields.cargo}}"
            fields:
              - label: "Nombre"
                name: "nombre"
                widget: "string"
                required: true

              - label: "Cargo"
                name: "cargo"
                widget: "string"
                required: true

              - label: "Foto"
                name: "imagen"
                widget: "image"
                required: true
                media_folder: "public/images/perfiles"
                public_folder: "/images/perfiles"

              - label: "Descripcion"
                name: "descripcion"
                widget: "text"
                required: true
