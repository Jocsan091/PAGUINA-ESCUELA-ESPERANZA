backend:
  name: github
  repo: Jocsan091/PAGUINA-ESCUELA-ESPERANZA
  branch: main
  base_url: https://paguina-escuela-esperanza.pages.dev
  auth_endpoint: /api/auth

local_backend: true

media_folder: "public/images/noticias"
public_folder: "/images/noticias"

collections:
  - name: "noticias"
    label: "Noticias"
    folder: "src/content/noticias"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Titulo"
        name: "title"
        widget: "string"
        required: true

      - label: "Resumen corto"
        name: "description"
        widget: "text"
        required: true

      - label: "Fecha"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false
        required: true

      - label: "Imagen principal"
        name: "image"
        widget: "image"
        required: true

      - label: "Galeria de imagenes"
        name: "gallery"
        widget: "list"
        required: false
        summary: "{{fields.foto_url}}"
        fields:
          - label: "Foto"
            name: "foto_url"
            widget: "image"
            required: true

      - label: "Video de YouTube"
        name: "video_url"
        widget: "string"
        required: false

      - label: "Borrador"
        name: "draft"
        widget: "boolean"
        default: false
        required: false

      - label: "Texto completo"
        name: "body"
        widget: "markdown"
        required: true
